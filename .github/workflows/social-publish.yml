name: Publish to Social Media

on:
  push:
    branches: [main]
    paths:
      - 'src/content/journal/**'
  workflow_dispatch:
    inputs:
      file:
        description: 'Journal entry path to publish'
        required: true
        type: string
      force_publish:
        description: 'Bypass unchanged-content idempotency check'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to detect changes

      - name: Get changed journal entries
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED="${{ github.event.inputs.file }}"
            echo "Manual dispatch for file: $CHANGED"
          else
            # Get list of changed journal entries
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'src/content/journal/*.md' 2>/dev/null | head -1)
          fi
           
          if [ -z "$CHANGED" ]; then
            echo "No journal entries changed"
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [ ! -f "$CHANGED" ]; then
            echo "Requested file does not exist: $CHANGED"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Changed file: $CHANGED"
            echo "file=$CHANGED" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.changed.outputs.skip != 'true'
        run: npm ci --ignore-scripts

      - name: Check publish_social flag and extract content
        if: steps.changed.outputs.skip != 'true'
        id: check
        run: |
          FILE="${{ steps.changed.outputs.file }}"
          FORCE_PUBLISH="${{ github.event.inputs.force_publish }}"
          SOCIAL_EXTRACTOR="scripts/extract-social-metadata.mjs"
          
          echo "Checking file: $FILE"
          node "$SOCIAL_EXTRACTOR" --file "$FILE" > /tmp/current-social.json
          echo "Social metadata extracted with UTF-8-safe parser"
          
          # Check for publish_social: true
          if [ "$(jq -r '.publish_social' /tmp/current-social.json)" = "true" ]; then
            echo "publish_social flag is TRUE"
            
            # Check if linkedin/threads content actually changed (idempotency check)
            # Get previous version of the file
            git show HEAD~1:"$FILE" > /tmp/prev_file.md 2>/dev/null || echo "" > /tmp/prev_file.md
            node "$SOCIAL_EXTRACTOR" --file /tmp/prev_file.md > /tmp/prev-social.json
            
            # Compare content hashes (include image/video URN so media changes trigger republish)
            CURR_HASH=$(jq -r '.content_hash' /tmp/current-social.json)
            PREV_HASH=$(jq -r '.content_hash' /tmp/prev-social.json)
            PREV_PUBLISH_SOCIAL=$(jq -r '.publish_social' /tmp/prev-social.json)
            AUDIO_URL=$(jq -r '.audio_url' /tmp/current-social.json)
            IMAGE_URN=$(jq -r '.image_urn' /tmp/current-social.json)
            DOCUMENT_URN=$(jq -r '.document_urn' /tmp/current-social.json)
            DOCUMENT_TITLE=$(jq -r '.document_title' /tmp/current-social.json)
            VIDEO_URN=$(jq -r '.video_urn' /tmp/current-social.json)

            python3 - <<'PY'
            import json
            from pathlib import Path

            with open('/tmp/current-social.json', 'r', encoding='utf-8') as f:
                data = json.load(f)

            Path('/tmp/linkedin.txt').write_text(data.get('linkedin', ''), encoding='utf-8')
            Path('/tmp/threads.txt').write_text(data.get('threads', ''), encoding='utf-8')
            PY
            
            echo "Current hash: $CURR_HASH"
            echo "Previous hash: $PREV_HASH"
            echo "Previous publish_social: $PREV_PUBLISH_SOCIAL"
            echo "Force publish: ${FORCE_PUBLISH:-false}"
            
            if [ "$FORCE_PUBLISH" = "true" ]; then
              echo "Force publish requested - bypassing idempotency check"
            elif [ "$CURR_HASH" = "$PREV_HASH" ] && [ -n "$PREV_HASH" ] && [ "$PREV_PUBLISH_SOCIAL" = "true" ]; then
              echo "Social content unchanged - skipping to prevent duplicate posts"
              echo "should_publish=false" >> $GITHUB_OUTPUT
              echo "skip_reason=unchanged" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            echo "Social content changed, force publish requested, or publish_social just transitioned to true - will publish to social media"
            echo "should_publish=true" >> $GITHUB_OUTPUT
            
            # Debug output
            echo "LinkedIn content chars: $(wc -m < /tmp/linkedin.txt)"
            echo "Threads content chars: $(wc -m < /tmp/threads.txt)"
            echo "Audio URL: $AUDIO_URL"
            echo "Image URN: $IMAGE_URN"
            echo "Document URN: $DOCUMENT_URN"
            echo "Document title: $DOCUMENT_TITLE"
            echo "Video URN: $VIDEO_URN"
            
            echo "audio_url=$AUDIO_URL" >> $GITHUB_OUTPUT
            echo "image_urn=$IMAGE_URN" >> $GITHUB_OUTPUT
            echo "document_urn=$DOCUMENT_URN" >> $GITHUB_OUTPUT
            echo "document_title=$DOCUMENT_TITLE" >> $GITHUB_OUTPUT
            echo "video_urn=$VIDEO_URN" >> $GITHUB_OUTPUT
            
          else
            echo "publish_social flag is not true, skipping social media publish"
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "skip_reason=publish_flag_false" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud
        if: steps.check.outputs.should_publish == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: steps.check.outputs.should_publish == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Publish to Pub/Sub
        if: steps.check.outputs.should_publish == 'true'
        env:
          AUDIO_URL: ${{ steps.check.outputs.audio_url }}
          IMAGE_URN: ${{ steps.check.outputs.image_urn }}
          DOCUMENT_URN: ${{ steps.check.outputs.document_urn }}
          DOCUMENT_TITLE: ${{ steps.check.outputs.document_title }}
          VIDEO_URN: ${{ steps.check.outputs.video_urn }}
        run: |
          echo "Publishing to social media via Pub/Sub..."
          
          # Build the JSON payload using UTF-8-safe raw files for multiline social copy
          PAYLOAD=$(jq -n \
            --rawfile linkedin /tmp/linkedin.txt \
            --rawfile threads /tmp/threads.txt \
            --arg audio_url "$AUDIO_URL" \
            --arg image_urn "$IMAGE_URN" \
            --arg document_urn "$DOCUMENT_URN" \
            --arg document_title "$DOCUMENT_TITLE" \
            --arg video_urn "$VIDEO_URN" \
            '{
              content: "New journal entry published",
              linkedin_content: $linkedin,
              threads_content: $threads,
              audio_url: $audio_url,
              image_urn: $image_urn,
              document_urn: $document_urn,
              document_title: $document_title,
              video_urn: $video_urn
            }')
          
          echo "Payload:"
          echo "$PAYLOAD" | jq .
          
          # Publish to Pub/Sub
          gcloud pubsub topics publish social-publish-events \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --message="$PAYLOAD"
          
          echo ""
          echo "✅ Published to Pub/Sub successfully!"
          echo "The Cloud Workflow will now post to LinkedIn and Threads."

      - name: Summary
        if: always()
        run: |
          echo "## Social Media Publishing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.changed.outputs.skip }}" == "true" ]; then
            echo "⏭️ **Skipped**: No journal entries were changed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.check.outputs.should_publish }}" != "true" ]; then
            if [ "${{ steps.check.outputs.skip_reason }}" = "unchanged" ]; then
              echo "⏭️ **Skipped**: Social content hash was unchanged from the last already-publishable version" >> $GITHUB_STEP_SUMMARY
            else
              echo "⏭️ **Skipped**: \`publish_social\` flag is not set to \`true\`" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To enable social publishing, add this to your entry's frontmatter:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`yaml" >> $GITHUB_STEP_SUMMARY
            echo "publish_social: true" >> $GITHUB_STEP_SUMMARY
            echo "linkedin: |" >> $GITHUB_STEP_SUMMARY
            echo "  Your LinkedIn content here..." >> $GITHUB_STEP_SUMMARY
            echo "threads: |" >> $GITHUB_STEP_SUMMARY
            echo "  Your Threads content here..." >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Published**: Content sent to Pub/Sub for distribution" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Platforms**: LinkedIn, Threads" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check [Cloud Workflows](https://console.cloud.google.com/workflows) for execution status." >> $GITHUB_STEP_SUMMARY
          fi
